<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'Helvetica Neue', sans-serif; background: #E8FFFC; color: #1a1a1a; }
  .app { max-width: 800px; margin: 0 auto; padding: 16px; }
  .header { background: white; color: #1a3a2a; padding: 20px 24px; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: center; gap: 20px; border: 1px solid #e0e0d8; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .header-logo { width: 48px; height: 48px; background: #4a9a6a; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 18px; color: white; }
  .header-text h1 { font-size: 18px; font-weight: 600; }
  .header-text p { font-size: 13px; opacity: 0.7; margin-top: 2px; }
  .progress { background: white; border-radius: 10px; padding: 12px 16px; margin-bottom: 16px; border: 1px solid #e0e0d8; }
  .progress-bar { height: 4px; background: #e0e0d8; border-radius: 2px; margin-top: 8px; }
  .progress-fill { height: 100%; background: #2a6a4a; border-radius: 2px; transition: width 0.3s; }
  .progress-text { font-size: 12px; color: #666; }
  .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; border: 1px solid #e0e0d8; }
  .card h2 { font-size: 16px; font-weight: 600; color: #1a3a2a; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid #e8e8e0; display: flex; align-items: center; gap: 8px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .field-row.three { grid-template-columns: 1fr 1fr 1fr; }
  .field-row.single { grid-template-columns: 1fr; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 12px; color: #555; font-weight: 500; }
  .field input, .field select, .field textarea { border: 1px solid #d8d8d0; border-radius: 8px; padding: 8px 10px; font-size: 14px; background: #fafaf8; width: 100%; outline: none; transition: border 0.2s; font-family: inherit; }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: #2a6a4a; background: white; }
  .field textarea { resize: vertical; min-height: 72px; }
  .checkbox-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
  .checkbox-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border: 1px solid #e0e0d8; border-radius: 8px; cursor: pointer; transition: all 0.15s; background: #fafaf8; }
  .checkbox-item:hover { border-color: #2a6a4a; background: #f0f8f4; }
  .checkbox-item.checked { border-color: #2a6a4a; background: #e8f4ee; }
  .checkbox-item input[type=checkbox] { width: 16px; height: 16px; accent-color: #2a6a4a; flex-shrink: 0; }
  .checkbox-item span { font-size: 13px; color: #333; }
  .section-divider { font-size: 11px; font-weight: 600; color: #2a6a4a; text-transform: uppercase; letter-spacing: 0.5px; margin: 14px 0 8px; }
  .btn { padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; font-family: inherit; }
  .btn-primary { background: #1a3a2a; color: white; width: 100%; margin-top: 8px; }
  .btn-primary:hover { background: #0f2a1a; }
  .btn-secondary { background: white; color: #1a3a2a; border: 1px solid #1a3a2a; }
  .btn-secondary:hover { background: #f0f8f4; }
  .btn-success { background: #2a6a4a; color: white; }
  .btn-success:hover { background: #1a5a3a; }
  .btn-row { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
  .summary-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f0f0e8; font-size: 13px; }
  .summary-row:last-child { border-bottom: none; }
  .summary-row .lbl { color: #555; }
  .summary-row .val { color: #1a1a1a; font-weight: 500; text-align: right; max-width: 60%; }
  .category-summary { background: #f8f9f6; border-radius: 8px; padding: 12px; margin-bottom: 10px; border-left: 3px solid #2a6a4a; }
  .category-summary h4 { font-size: 13px; font-weight: 600; color: #1a3a2a; margin-bottom: 6px; }
  .webhook-input { border: 1px solid #d8d8d0; border-radius: 8px; padding: 8px 10px; font-size: 14px; background: #fafaf8; width: 100%; outline: none; font-family: inherit; }
  .webhook-input:focus { border-color: #2a6a4a; background: white; }
  .status-msg { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-top: 12px; }
  .status-success { background: #e8f4ee; color: #1a5a3a; border: 1px solid #b0d8c0; }
  .status-error { background: #fce8e8; color: #8a1a1a; border: 1px solid #f0b0b0; }
  .status-sending { background: #e8f0fc; color: #1a3a7a; border: 1px solid #b0c8f0; }
  .empty-note { text-align: center; color: #888; font-size: 13px; padding: 8px; }
  gmp-placeautocomplete {
    width: 100%;
    display: block;
    --gmp-material-container-color: #fafaf8;
    --gmp-material-on-container-color: #1a1a1a;
    --gmp-material-outline-color: #d8d8d0;
    --gmp-material-surface-color: white;
    --gmp-material-on-surface-color: #1a1a1a;
    --gmp-material-primary-color: #2a6a4a;
    border: 1px solid #d8d8d0;
    border-radius: 8px;
    overflow: hidden;
    box-sizing: border-box;
  }
  @media (max-width: 600px) {
    .field-row { grid-template-columns: 1fr; }
    .field-row.three { grid-template-columns: 1fr 1fr; }
    .checkbox-grid { grid-template-columns: 1fr 1fr; }
    .btn-row { flex-direction: column; }
  }
</style>

const FIELD_LABELS = {};

let state = {
  screen: 'form',
  webhookUrl: localStorage.getItem('rafter_webhook') || '',
  sendStatus: '',
  job: { clientName:'', siteAddress:'', date: new Date().toISOString().split('T')[0], preparedBy:'Andy', notes:'' },
  selected: [],
  fields: {}
};

function sf(id, val) { state.fields[id] = val; }
function gf(id) { return state.fields[id] || ''; }

function inp(id, label, placeholder, type) {
  FIELD_LABELS[id] = label;
  const t = type || 'text';
  const v = gf(id);
  return `<div class="field"><label>${label}</label><input type="${t}" id="${id}" value="${v}" placeholder="${placeholder||''}" oninput="sf('${id}',this.value)"></div>`;
}
function num(id, label) {
  FIELD_LABELS[id] = label;
  return `<div class="field"><label>${label}</label><input type="number" id="${id}" value="${gf(id)}" placeholder="0" oninput="sf('${id}',this.value)"></div>`;
}
function sel(id, label, opts) {
  FIELD_LABELS[id] = label;
  const v = gf(id);
  const os = opts.map(o=>`<option value="${o}" ${v===o?'selected':''}>${o}</option>`).join('');
  return `<div class="field"><label>${label}</label><select id="${id}" onchange="sf('${id}',this.value)"><option value="">Select</option>${os}</select></div>`;
}
function ta(id, label) {
  FIELD_LABELS[id] = label;
  return `<div class="field"><label>${label}</label><textarea id="${id}" oninput="sf('${id}',this.value)" placeholder="Notes...">${gf(id)}</textarea></div>`;
}
function yn(id, label) { return sel(id, label, ['Yes','No']); }
function row(...f) { return `<div class="field-row">${f.join('')}</div>`; }
function row3(...f) { return `<div class="field-row three">${f.join('')}</div>`; }
function single(f) { return `<div class="field-row single">${f}</div>`; }
function div(t) { return `<div class="section-divider">${t}</div>`; }

function catFields(cat) {
  switch(cat) {
    case 'Site Setup & Cleanup':
      return row(num('ssc_bh','Billable Hours'), inp('ssc_skip','Skip Size','e.g. 4m³'))
           + row(num('ssc_spray','Spray Subby Cost $'), num('ssc_pclean','Pressure Clean Subby Cost $'));

    case 'Excavation':
      return row(num('exc_bh','Billable Hours'), inp('exc_mach','Machinery Type','e.g. 5T excavator'))
           + div('Area 1')
           + row(num('exc_a1_sqm','Area 1 sqm'), num('exc_a1_dep','Area 1 Depth mm'))
           + div('Area 2 (if applicable)')
           + row(num('exc_a2_sqm','Area 2 sqm'), num('exc_a2_dep','Area 2 Depth mm'))
           + div('Area 3 (if applicable)')
           + row(num('exc_a3_sqm','Area 3 sqm'), num('exc_a3_dep','Area 3 Depth mm'))
           + single(inp('exc_skip','Waste / Skip Disposal Notes','e.g. council pickup, skip hire'));

    case 'Drainage':
      return row(num('drn_bh','Billable Hours'), num('drn_parts','Drain Parts Cost $'))
           + single(num('drn_plumb','Plumber Subby Cost $'));

    case 'Retaining Wall (Sleeper)':
      return row(num('rws_bh','Billable Hours'), num('rws_count','Sleeper Count'))
           + row(inp('rws_type','Sleeper Type','e.g. Merbau 200x75'), inp('rws_size','Sleeper Size mm','e.g. 200x75'))

    case 'Paving':
      return row(num('pav_bh','Billable Hours'), num('pav_sub','Subby Cost $'))

           + row3(num('pav_crush','Crushed Rock'), num('pav_reo','Reo Mesh'), num('pav_wsand','Washed Sand'))

    case 'Steppers':
      return row(num('stp_bh','Billable Hours'), num('stp_sub','Subby Cost $'))
           + row3(num('stp_count','Stepper Count'), inp('stp_mat','Paver Material','e.g. Bluestone'), num('stp_area','Area sqm'))
           + row(inp('stp_size','Size mm','e.g. 600x400'), num('stp_bsand','Brick Sand'))
           + row(num('stp_cem','Cement'), num('stp_mort','Mortar'), num('stp_bond','Bondcrete'));

    case 'Paving Sealer':

    case 'Fencing':

    case 'Carpentry':
      return single(num('carp_sub','Subby Cost $'))

    case 'Painting':

    case 'Garden Edging':

           + row(inp('ged_col','Colour','e.g. Weathered'), num('ged_stakes','Stakes'))

           + row(num('trl_len','Length m'), num('trl_hgt','Height m'))

      return row(num('spl_bh','Billable Hours'), num('spl_comp','Compost m³'))

    case 'Synthetic Turf':
      return row(num('stf_bh','Billable Hours'), num('stf_sub','Subby Cost $'))

    default: return '';

}

function buildLineItems() {
  const items = [];
  const f = state.fields;

  function addItem(code, name, qty) {
    if (!qty || parseFloat(qty) <= 0) return;
    items.push({ itemCode: code, name, qty: parseFloat(qty), material_uuid: MATERIAL_UUIDS[code]||'' });
  }
  function addYN(fieldKey, code, name) {
    if (f[fieldKey] === 'Yes') items.push({ itemCode: code, name, qty: 1, material_uuid: MATERIAL_UUIDS[code]||'' });
  }

  const bhKeys = {
    'Site Setup & Cleanup':'ssc_bh','Excavation':'exc_bh','Drainage':'drn_bh',
    'Retaining Wall (Sleeper)':'rws_bh','Block Wall':'bwl_bh','Brick Edging':'bed_bh',
    'Paving':'pav_bh','Steppers':'stp_bh','Fencing':'fen_bh','Garden Edging':'ged_bh',
    'Trellis':'trl_bh','Soil Prep & Planting':'spl_bh','Irrigation':'irr_bh',
    'Mulching':'mul_bh','Instant Turf':'itf_bh','Synthetic Turf':'stf_bh',
    'Gravel & Stone':'grs_bh','Plant Establishment':'ple_bh','Turf Establishment':'tes_bh'
  };

  state.selected.forEach(cat => {
    const bk = bhKeys[cat];
    if(bk && f[bk] && parseFloat(f[bk]) > 0) {
      const labCode = LAB_CODES[cat]||'LAB-001';
      items.push({ itemCode: labCode, name:`Labour - ${cat}`, qty: parseFloat(f[bk]), material_uuid: MATERIAL_UUIDS[labCode]||'' });
    }
    switch(cat) {
      case 'Site Setup & Cleanup':
        if(f.ssc_spray && parseFloat(f.ssc_spray)>0) items.push({itemCode:'SUB-001',name:'Subcontractor - Spray',qty:1,unitPrice:parseFloat(f.ssc_spray),material_uuid:MATERIAL_UUIDS['SUB-001']});
        if(f.ssc_pclean && parseFloat(f.ssc_pclean)>0) items.push({itemCode:'SUB-002',name:'Subcontractor - Pressure Clean',qty:1,unitPrice:parseFloat(f.ssc_pclean),material_uuid:MATERIAL_UUIDS['SUB-002']});
        break;
      case 'Excavation':
        if(f.exc_a1_sqm) addItem('EXC-001','Excavation - Machinery Hire',1);
        if(f.exc_skip) addItem('EXC-002','Excavation - Skip Bin Disposal',1);
        break;
      case 'Drainage':
        if(f.drn_plumb && parseFloat(f.drn_plumb)>0) items.push({itemCode:'SUB-003',name:'Subcontractor - Plumber',qty:1,unitPrice:parseFloat(f.drn_plumb),material_uuid:MATERIAL_UUIDS['SUB-003']});
        if(f.drn_parts && parseFloat(f.drn_parts)>0) addItem('DRN-001','Drainage - Parts',1);
        break;
      case 'Retaining Wall (Sleeper)':
        addItem('RWS-001','Retaining Wall - Sleepers',f.rws_count);
        addItem('RWS-002','Retaining Wall - Posts',f.rws_posts);
        addItem('RWS-003','Retaining Wall - Concrete (m3)',f.rws_conc);
        if(f.rws_scoria) addItem('RWS-004','Retaining Wall - Scoria',1);
        addYN('rws_del','RWS-005','Retaining Wall - Delivery');
        break;
      case 'Block Wall':
        if(f.bwl_sub && parseFloat(f.bwl_sub)>0) items.push({itemCode:'SUB-004',name:'Subcontractor - Block Wall',qty:1,unitPrice:parseFloat(f.bwl_sub),material_uuid:MATERIAL_UUIDS['SUB-004']});
        addItem('BWL-001','Block Wall - Besser Blocks',f.bwl_blocks);
        addItem('BWL-002','Block Wall - Trench Mesh',f.bwl_mesh);
        addItem('BWL-003','Block Wall - Rod N12',f.bwl_rod);
        addItem('BWL-004','Block Wall - Footing Concrete (m3)',f.bwl_foot);

        addItem('STF-001','Synthetic Turf - Turf',f.stf_area);
        addItem('STF-002','Synthetic Turf - Crushed Rock',f.stf_crush);
        addItem('STF-003','Synthetic Turf - Crusher Dust',f.stf_dust);
        addItem('STF-004','Synthetic Turf - Pegs',f.stf_pegs);

function buildPayload() {
  const flat = {
    clientName: state.job.clientName,
    siteAddress: state.job.siteAddress,
    date: state.job.date,
    preparedBy: state.job.preparedBy,
    notes: state.job.notes,
    categories: state.selected.join(', '),
    submittedAt: new Date().toISOString(),
    lineItems: buildLineItems()
  };
  Object.entries(state.fields).filter(([,v])=>v).forEach(([k,v])=>{ flat[k]=v; });
  return flat;
}

function generatePDFBase64() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const p = buildPayload();
  
  const margin = 15;
  const pageW = 180;
  const pageH = 297;
  const lineH = 6;
  const sectionGap = 5;
  
  // Colours
  const darkGreen = [26, 58, 42];
  const midGreen = [42, 106, 74];
  const lightGreen = [232, 244, 238];
  const black = [17, 31, 28];
  const grey = [100, 100, 100];
  const lightGrey = [240, 240, 238];
  
  let y = 0;
  
  function checkPage(needed) {
    if (y + needed > pageH - 20) {
      doc.addPage();
      y = 15;
      drawPageHeader();
    }
  }
  
  function drawPageHeader() {
    // Green header bar
    doc.setFillColor(...darkGreen);
    doc.rect(0, 0, 210, 22, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(14);
    doc.setFont('helvetica', 'bold');
    doc.text('TWO MEN AND A SHOVEL', margin, 10);
    doc.setFontSize(9);
    doc.setFont('helvetica', 'normal');
    doc.text('Site Visit Quoting Sheet', margin, 17);
    // Right side - date
    doc.setFontSize(8);
    doc.text(`${p.date}  |  Prepared by: ${p.preparedBy}`, 210 - margin, 10, { align: 'right' });
    doc.setTextColor(...black);
    y = 30;
  }

  function sectionHeader(title) {
    checkPage(14);
    doc.setFillColor(...lightGreen);
    doc.rect(margin, y, pageW, 8, 'F');
    doc.setFillColor(...midGreen);
    doc.rect(margin, y, 3, 8, 'F');
    doc.setTextColor(...darkGreen);
    doc.setFontSize(10);
    doc.setFont('helvetica', 'bold');
    doc.text(title.toUpperCase(), margin + 6, y + 5.5);
    doc.setTextColor(...black);
    y += 11;
  }
  
  function fieldRow(label, value) {
    if (!value) return;
    const valLines = doc.splitTextToSize(String(value), pageW - 6);
    checkPage(5 + lineH + valLines.length * lineH);
    // Label above value — no inline overlap possible
    doc.setFontSize(7.5);
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(...grey);
    doc.text(label.toUpperCase(), margin + 2, y);
    y += 4.5;
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(...black);
    doc.setFontSize(9);
    doc.text(valLines, margin + 2, y);
    y += valLines.length * lineH + 1.5;
  }

  function twoColRow(label1, val1, label2, val2) {
    if (!val1 && !val2) return;
    const colW = pageW / 2 - 2;
    // Each cell: label line then value line, stacked — no inline overlap
    const v1Lines = val1 ? doc.splitTextToSize(String(val1), colW - 4) : [];
    const v2Lines = val2 ? doc.splitTextToSize(String(val2), colW - 4) : [];
    const cellH = 4.5 + Math.max(v1Lines.length, v2Lines.length) * lineH + 2;
    checkPage(cellH);
    // Left cell label
    doc.setFontSize(7.5);
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(...grey);
    if (val1) doc.text(label1.toUpperCase(), margin + 2, y);
    // Right cell label
    if (val2) doc.text(label2.toUpperCase(), margin + colW + 4, y);
    y += 4.5;
    // Left cell value
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(...black);
    doc.setFontSize(9);
    if (val1) doc.text(v1Lines, margin + 2, y);
    // Right cell value
    if (val2) doc.text(v2Lines, margin + colW + 4, y);
    y += Math.max(v1Lines.length, v2Lines.length) * lineH + 2;
  }

  // Draw first page header
  drawPageHeader();

  // Job summary box
  doc.setFillColor(...lightGrey);
  doc.roundedRect(margin, y, pageW, 28, 2, 2, 'F');
  doc.setFontSize(13);
  doc.setFont('helvetica', 'bold');
  doc.setTextColor(...darkGreen);
  doc.text(p.clientName || '—', margin + 4, y + 8);
  doc.setFontSize(9);
  doc.setFont('helvetica', 'normal');
  doc.setTextColor(...grey);
  doc.text(p.siteAddress || '—', margin + 4, y + 15);
  doc.setFontSize(8);
  doc.text(`Categories: ${p.categories || '—'}`, margin + 4, y + 22);
  y += 34;

  // General notes
  if (p.notes) {
    doc.setFillColor(255, 249, 230);
    doc.setDrawColor(200, 160, 0);
    doc.roundedRect(margin, y, pageW, 10 + doc.splitTextToSize(p.notes, pageW - 8).length * lineH, 2, 2, 'FD');
    doc.setFontSize(8);
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(140, 100, 0);
    doc.text('SITE NOTES', margin + 3, y + 5);
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(...black);
    doc.setFontSize(9);
    const noteLines = doc.splitTextToSize(p.notes, pageW - 8);
    doc.text(noteLines, margin + 3, y + 10);
    y += 14 + noteLines.length * lineH;
  }

  y += sectionGap;

  // Category sections
  state.selected.forEach(cat => {
    const prefix = CAT_PREFIX[cat];
    const entries = Object.entries(state.fields).filter(([k,v]) => v && k.startsWith(prefix + '_'));
    if (!entries.length) return;
    
    sectionHeader(cat);
    
    // Group into pairs for two-column layout
    for (let i = 0; i < entries.length; i += 2) {
      const [k1, v1] = entries[i];
      const [k2, v2] = entries[i + 1] || [null, null];
      const l1 = FIELD_LABELS[k1] || k1;
      const l2 = k2 ? (FIELD_LABELS[k2] || k2) : null;
      twoColRow(l1, v1, l2, v2);
    }
    y += sectionGap;
  });

  // Line items table
  if (p.lineItems && p.lineItems.length > 0) {
    sectionHeader('ServiceM8 Line Items');
    
    // Table header
    doc.setFillColor(...darkGreen);
    doc.rect(margin, y, pageW, 7, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(8);
    doc.setFont('helvetica', 'bold');
    doc.text('ITEM CODE', margin + 2, y + 5);
    doc.text('DESCRIPTION', margin + 30, y + 5);
    doc.text('QTY', margin + pageW - 15, y + 5);
    y += 7;

    p.lineItems.forEach((li, idx) => {
      checkPage(7);
      if (idx % 2 === 0) {
        doc.setFillColor(248, 249, 246);
        doc.rect(margin, y, pageW, 6, 'F');
      }
      doc.setTextColor(...black);
      doc.setFontSize(8);
      doc.setFont('helvetica', 'normal');
      doc.text(li.itemCode || '', margin + 2, y + 4);
      doc.text(li.name || '', margin + 30, y + 4);
      doc.text(String(li.qty || ''), margin + pageW - 15, y + 4);
      y += 6;
    });
    y += sectionGap;
  }

  // Footer on each page
  const totalPages = doc.getNumberOfPages();
  for (let i = 1; i <= totalPages; i++) {
    doc.setPage(i);
    doc.setFillColor(...darkGreen);
    doc.rect(0, pageH - 12, 210, 12, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(7);
    doc.setFont('helvetica', 'normal');
    doc.text(`Two Men and a Shovel  |  Site Visit Quote  |  ${new Date().toLocaleString('en-AU')}`, margin, pageH - 5);
    doc.text(`Page ${i} of ${totalPages}`, 210 - margin, pageH - 5, { align: 'right' });
  }

  return doc.output('datauristring').split(',')[1];
}

async function sendToMake() {
  if(!state.webhookUrl) { state.sendStatus='error:Please enter your Make webhook URL first.'; render(); return; }
  state.sendStatus='sending'; render();
  try {
    const payload = buildPayload();
    const pdfBase64 = generatePDFBase64();
    const pdfName = `Quote_${(payload.clientName||'Draft').replace(/\s+/g,'_')}_${payload.date}.pdf`;
    payload.pdfBase64 = pdfBase64;
    payload.pdfName = pdfName;

    // Send to Make webhook (ServiceM8)
    const webhookPromise = state.webhookUrl ? fetch(state.webhookUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    }) : Promise.resolve();

    await webhookPromise;
    state.sendStatus='success'; render();
  } catch(e) {
    console.error('Send error:', e);
    state.sendStatus='error:Failed to send. Check console for details.'; render();
  }
}

function downloadSummary() {
  const p = buildPayload();
  let lines = ['TWO MEN AND A SHOVEL','Site Visit Quote Summary','='.repeat(40),''];
  lines.push(`Client: ${p.clientName}`, `Address: ${p.siteAddress}`, `Date: ${p.date}`, `Prepared by: ${p.preparedBy}`, '');
  lines.push('SITE NOTES', '-'.repeat(30), p.notes||'None', '');
  lines.push('CATEGORIES', '-'.repeat(30), ...state.selected, '');
  lines.push('LINE ITEMS FOR SERVICEM8', '-'.repeat(30));
  p.lineItems.forEach(li => lines.push(`${li.itemCode} | ${li.name} | Qty: ${li.qty}${li.unitPrice?' | Price: $'+li.unitPrice:''}`));
  lines.push('', '='.repeat(40), 'Powered by Rafter');
  const blob = new Blob([lines.join('\n')], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `Quote_${(p.clientName||'Draft').replace(/\s+/g,'_')}_${p.date}.txt`;
  a.click();
}

function toggleCat(cat) {
  if(state.selected.includes(cat)) state.selected = state.selected.filter(c=>c!==cat);
  else state.selected.push(cat);
  render();
}

async function initAutocomplete() {
  const input = document.getElementById('job_addr_field');
  if (!input || input.tagName === 'GMP-PLACEAUTOCOMPLETE') return;
  
  try {
    const { PlaceAutocompleteElement } = await google.maps.importLibrary('places');
    
    // Create the autocomplete element restricted to Australia
    const autocompleteEl = new PlaceAutocompleteElement({
      includedRegionCodes: ['au'],
      types: ['address']
    });
    
    // Style it to match our form
    autocompleteEl.style.width = '100%';
    autocompleteEl.style.display = 'block';
    
    // Replace the input with the autocomplete element
    input.parentNode.replaceChild(autocompleteEl, input);
    autocompleteEl.id = 'job_addr_field';
    
    // Listen for place selection - correct event for PlaceAutocompleteElement
    autocompleteEl.addEventListener('gmp-select', async (event) => {
      const place = event.placePrediction.toPlace();
      await place.fetchFields({ fields: ['formattedAddress'] });
      state.job.siteAddress = place.formattedAddress;
      console.log('Address selected:', place.formattedAddress);
    });
    
    // For manual typing (no suggestion selected), read the internal input value
    autocompleteEl.addEventListener('input', () => {
      const inner = autocompleteEl.querySelector('input');
      if (inner) state.job.siteAddress = inner.value || '';
    });
    
  } catch(err) {
    console.log('Places API error:', err);
  }
}

function captureJobFields() {
  // clientName: read directly from DOM input (plain input, always safe)
  const cn = document.getElementById('job_client_field');
  if(cn) state.job.clientName = cn.value;
  // siteAddress: do NOT read from DOM — state.job.siteAddress is already the
  // source of truth, set by the gmp-select listener (autocomplete pick) or
  // the oninput handler on the plain input (manual typing / before GMP loads).
  // Reading sa.value here would overwrite it with '' when GMP is active.
}

function render() {
  const root = document.getElementById('root');
  const prog = state.screen==='form' ? Math.min(90, 10 + state.selected.length * 3) : 100;

  if(state.screen==='summary') {
    const p = buildPayload();
    let catHtml = '';
    state.selected.forEach(cat => {
      const prefix = CAT_PREFIX[cat];
      const entries = Object.entries(state.fields).filter(([k,v])=> v && k.startsWith(prefix+'_'));
      if(!entries.length) { catHtml += `<div class="category-summary"><h4>${cat}</h4><p style="font-size:12px;color:#888">No details entered.</p></div>`; return; }
      catHtml += `<div class="category-summary"><h4>${cat}</h4>`;
      entries.forEach(([k,v]) => {
        const label = FIELD_LABELS[k] || k;
        catHtml += `<div class="summary-row"><span class="lbl">${label}</span><span class="val">${v}</span></div>`;
      });
      catHtml += '</div>';
    });
    let statusHtml = '';
    if(state.sendStatus==='sending') statusHtml=`<div class="status-msg status-sending">Sending to Make...</div>`;
    else if(state.sendStatus==='success') statusHtml=`<div class="status-msg status-success">Sent successfully. Check ServiceM8 for the new job card.</div>`;
    else if(state.sendStatus.startsWith('error:')) statusHtml=`<div class="status-msg status-error">${state.sendStatus.slice(6)}</div>`;

    root.innerHTML = `
      <div class="progress"><div class="progress-text">Step 2 of 2 — Review &amp; Submit</div><div class="progress-bar"><div class="progress-fill" style="width:100%"></div></div></div>
      <div class="card">
        <h2>Job Summary</h2>
        <div class="summary-row"><span class="lbl">Client</span><span class="val">${p.clientName||'—'}</span></div>
        <div class="summary-row"><span class="lbl">Site Address</span><span class="val">${p.siteAddress||'—'}</span></div>
        <div class="summary-row"><span class="lbl">Date</span><span class="val">${p.date}</span></div>
        <div class="summary-row"><span class="lbl">Prepared By</span><span class="val">${p.preparedBy}</span></div>
        <div class="summary-row"><span class="lbl">Categories</span><span class="val">${state.selected.join(', ')}</span></div>
        ${p.notes?`<div class="summary-row"><span class="lbl">Notes</span><span class="val">${p.notes}</span></div>`:''}
      </div>
      <div class="card">
        <h2>Category Details</h2>
        ${catHtml||'<p style="color:#888;font-size:13px;">No categories selected.</p>'}
      </div>
      <div class="card">
        <h2>Send to ServiceM8 via Make</h2>
        <div class="field" style="margin-bottom:0">
          <label>Make Webhook URL</label>
          <input class="webhook-input" type="text" placeholder="https://hook.eu1.make.com/..." value="${state.webhookUrl}" oninput="state.webhookUrl=this.value;localStorage.setItem('rafter_webhook',this.value)">
        </div>
        ${statusHtml}
        <div class="btn-row">
          <button class="btn btn-secondary" onclick="state.screen='form';state.sendStatus='';render()">&#8592; Edit</button>
          <button class="btn btn-secondary" onclick="downloadSummary()">Download Summary</button>
          <button class="btn btn-success" onclick="sendToMake()">Send to ServiceM8 &#8594;</button>
        </div>
      </div>`;
    return;
  }

  let catCards = state.selected.map(cat =>
    `<div class="card"><h2>${cat}</h2>${catFields(cat)}</div>`
  ).join('');

  root.innerHTML = `
    <div class="progress"><div class="progress-text">Step 1 of 2 — Site Visit Details</div><div class="progress-bar"><div class="progress-fill" style="width:${prog}%"></div></div></div>
    <div class="card">
      <h2>Job Details</h2>
      ${row(`<div class="field"><label>Client Name</label><input type="text" id="job_client_field" value="${state.job.clientName}" placeholder="e.g. John Smith" oninput="state.job.clientName=this.value"></div>`,
            `<div class="field"><label>Site Address</label><input type="text" id="job_addr_field" value="${state.job.siteAddress}" placeholder="e.g. 12 Main St, Caulfield" oninput="state.job.siteAddress=this.value"></div>`)}
      ${row(`<div class="field"><label>Date of Visit</label><input type="date" value="${state.job.date}" oninput="state.job.date=this.value"></div>`,
            `<div class="field"><label>Prepared By</label><select onchange="state.job.preparedBy=this.value"><option ${state.job.preparedBy==='Andy'?'selected':''}>Andy</option><option ${state.job.preparedBy==='Rob'?'selected':''}>Rob</option></select></div>`)}
      ${single(`<div class="field"><label>General Site Notes</label><textarea oninput="state.job.notes=this.value" placeholder="Access issues, special requirements, site conditions...">${state.job.notes}</textarea></div>`)}
    </div>
    <div class="card">
      <h2>Job Categories</h2>
      <p style="font-size:13px;color:#666;margin-bottom:12px;">Select all categories that apply to this job.</p>
      <div class="checkbox-grid">
        ${CATEGORIES.map(c=>`<label class="checkbox-item ${state.selected.includes(c)?'checked':''}">
          <input type="checkbox" ${state.selected.includes(c)?'checked':''} onchange="toggleCat('${c}')">
          <span>${c}</span></label>`).join('')}
      </div>
    </div>
    ${catCards}
    ${state.selected.length > 0
      ? `<button class="btn btn-primary" onclick="captureJobFields();state.screen='summary';state.sendStatus='';render()">Review &amp; Submit &#8594;</button>`
      : `<p class="empty-note">Select at least one category above to continue.</p>`}`;
  // Reinitialise address autocomplete after render
  setTimeout(() => {
    if (typeof google !== 'undefined' && state.screen === 'form') initAutocomplete();
  }, 100);
}

render();
</script>
