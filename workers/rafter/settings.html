     Same instance + pattern as the form and onboarding pages. -->
<script
  data-clerk-publishable-key="pk_test_Zmlyc3Qta2l3aS0zLmNsZXJrLmFjY291bnRzLmRldiQ"

<style>
  :root {
    --rf-navy: #1B4F72;
    --rf-ocean: #2E86AB;
    --rf-teal-bg: #EAF4F8;
    --rf-teal-border: #A8D5E2;
    --rf-outer: #1B3A52;
    --rf-card: #FFFFFF;
    --rf-row-bg: #F7F9FC;
    --rf-border: #D4D0C8;
    --rf-divider: #E8E4DC;
    --rf-text: #1C1C1C;
    --rf-muted: #6B7280;
    --rf-danger: #B91C1C;
    --rf-success: #166534;
    --shadow-card: 0 1px 2px rgba(15, 23, 42, 0.04), 0 1px 1px rgba(15, 23, 42, 0.03);
    --shadow-navy-btn: 0 1px 2px rgba(27, 79, 114, 0.25);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; color: var(--rf-text); background: var(--rf-outer); min-height: 100vh; }
  body { padding: 16px; }
  .page { max-width: 760px; margin: 0 auto; }

  .card { background: var(--rf-card); border-radius: 12px; box-shadow: var(--shadow-card); border: 0.5px solid var(--rf-border); }
  .card + .card { margin-top: 12px; }

  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; }
  .topbar-title { font-size: 16px; font-weight: 600; color: var(--rf-navy); display: flex; align-items: center; gap: 8px; }
  .topbar-title i { font-size: 18px; }
  .back-link { font-size: 13px; color: var(--rf-muted); text-decoration: none; display: inline-flex; align-items: center; gap: 4px; padding: 6px 10px; border-radius: 6px; transition: background 0.12s; }
  .back-link:hover { background: var(--rf-row-bg); }

  .pane { padding: 16px 18px 18px; }
  .pane-header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 12px; border-bottom: 0.5px solid var(--rf-divider); margin-bottom: 12px; }
  .pane-header h2 { font-size: 14px; font-weight: 600; color: var(--rf-navy); text-transform: uppercase; letter-spacing: 0.04em; }
  .pane-actions { display: flex; gap: 8px; }

  .btn { background: var(--rf-card); color: var(--rf-navy); border: 0.5px solid var(--rf-border); border-radius: 8px; padding: 8px 12px; font-size: 12px; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: filter 0.12s, background 0.12s; font-family: inherit; }
  .btn:hover { filter: brightness(0.97); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn.primary { background: var(--rf-navy); color: #fff; border-color: var(--rf-navy); box-shadow: var(--shadow-navy-btn); }
  .btn.danger { color: var(--rf-danger); border-color: #FCA5A5; }
  .btn.small { padding: 5px 8px; font-size: 11px; }
  .btn i { font-size: 14px; }

  /* Section + its photos: mirrors the form's section card layout. */
  .section-card { border: 0.5px solid var(--rf-border); border-radius: 10px; margin-top: 10px; overflow: hidden; }
  .section-card .sec-head { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--rf-row-bg); border-bottom: 0.5px solid var(--rf-divider); }
  .sec-name { font-size: 13px; font-weight: 600; color: var(--rf-navy); }
  .sec-prose { padding: 10px 14px; font-size: 12px; color: var(--rf-muted); line-height: 1.5; white-space: pre-wrap; border-bottom: 0.5px solid var(--rf-divider); background: #FAFAF7; }
  .sec-prose-empty { font-style: italic; color: var(--rf-muted); }
  .sec-readonly-badge { font-size: 9px; color: var(--rf-muted); background: var(--rf-divider); padding: 2px 6px; border-radius: 10px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }

  .sec-photos { padding: 10px 14px; }
  .sec-photos-meta { font-size: 11px; color: var(--rf-muted); margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .photo-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  @media (max-width: 480px) { .photo-grid { grid-template-columns: repeat(3, 1fr); } }
  .photo-cell { aspect-ratio: 1 / 1; border-radius: 6px; overflow: hidden; background: #f3f3f3; position: relative; cursor: grab; border: 2px solid transparent; transition: border 0.12s; }
  .photo-cell:active { cursor: grabbing; }
  .photo-cell.selected { border-color: var(--rf-navy); }
  .photo-cell.drag-over { border-color: var(--rf-ocean); border-style: dashed; }
  .photo-cell.drag-ghost { opacity: 0.4; }
  .photo-cell img { width: 100%; height: 100%; object-fit: cover; display: block; pointer-events: none; }
  /* Always-visible checkbox top-left (mobile-friendly — no hover dependency). */
  .photo-check { position: absolute; top: 4px; left: 4px; width: 22px; height: 22px; border-radius: 4px; background: rgba(255,255,255,0.9); border: 1.5px solid var(--rf-border); display: inline-flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.12s; }
  .photo-check:hover { background: #fff; }
  .photo-cell.selected .photo-check { background: var(--rf-navy); border-color: var(--rf-navy); color: #fff; }
  .photo-check .check-mark { font-size: 14px; color: inherit; opacity: 0; transition: opacity 0.12s; }
  .photo-cell.selected .photo-check .check-mark { opacity: 1; }
  /* Single-photo hover actions sit top-right (recategorise + delete). */
  .photo-cell .photo-actions { position: absolute; top: 2px; right: 2px; display: flex; gap: 2px; opacity: 0; transition: opacity 0.12s; }
  .photo-cell:hover .photo-actions { opacity: 1; }
  .photo-action-btn { width: 24px; height: 24px; border-radius: 4px; background: rgba(0,0,0,0.65); color: #fff; border: none; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; font-size: 13px; padding: 0; }
  .photo-action-btn:hover { background: rgba(0,0,0,0.85); }
  .no-photos { font-size: 11px; color: var(--rf-muted); font-style: italic; padding: 8px 0; }

  /* RFT-63 Q6: per-section bulk-action bar shown when ≥1 photo in this
     section is selected. Lives below the grid, scrolls with the section. */
  .sec-bulk-bar { display: none; align-items: center; gap: 8px; padding: 8px 0 0; margin-top: 8px; border-top: 0.5px dashed var(--rf-divider); }
  .sec-bulk-bar.visible { display: flex; flex-wrap: wrap; }
  .sec-bulk-count { font-size: 11px; font-weight: 600; color: var(--rf-navy); }

  /* RFT-63 Q6: count rollup at the top of the pane. */
  .pane-rollup { font-size: 12px; color: var(--rf-muted); margin-bottom: 12px; padding: 8px 12px; background: var(--rf-row-bg); border-radius: 6px; }
  .pane-rollup strong { color: var(--rf-navy); }

  .upload-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 0.5px dashed var(--rf-divider); }

  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--rf-navy); color: #fff; padding: 10px 16px; border-radius: 8px; font-size: 13px; z-index: 1000; box-shadow: 0 4px 14px rgba(0,0,0,0.2); }
  .toast.err { background: var(--rf-danger); }

  /* Recategorise modal */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 999; padding: 16px; }
  .modal { background: var(--rf-card); border-radius: 12px; max-width: 400px; width: 100%; padding: 18px; }
  .modal h3 { font-size: 14px; margin-bottom: 12px; }
  .modal-pills { display: flex; flex-wrap: wrap; gap: 6px; max-height: 240px; overflow-y: auto; padding: 4px; margin-bottom: 12px; }
  .modal-pill { background: var(--rf-teal-bg); color: var(--rf-navy); border: 0.5px solid var(--rf-teal-border); border-radius: 18px; padding: 8px 14px; font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; cursor: pointer; min-height: 32px; display: inline-flex; align-items: center; font-family: inherit; line-height: 1.3; }
  .modal-pill:hover { filter: brightness(0.97); }
  .modal-pill.current { opacity: 0.5; cursor: not-allowed; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; }

  .loading-card { text-align: center; padding: 40px 18px; color: var(--rf-muted); font-size: 13px; }
  .error-card { padding: 16px 18px; }
  .error-card .err-title { color: var(--rf-danger); font-weight: 600; margin-bottom: 4px; }
  .error-card .err-msg { font-size: 13px; color: var(--rf-muted); }
</style>
</head>
<body>
<div class="page">

  <!-- Topbar -->
  <div class="card topbar">
    <div class="topbar-title">
      <i class="ti ti-settings"></i>
      <span id="topbarTitle">Settings</span>
    </div>
    <a href="#" id="backLink" class="back-link"><i class="ti ti-arrow-left"></i><span>Back to quote builder</span></a>
  </div>

  <!-- Loading state -->
  <div id="loadingState" class="card loading-card">
    <div>Loading settings…</div>
  </div>

  <!-- Error state -->
  <div id="errorState" class="card error-card" style="display:none;">
    <div class="err-title" id="errTitle">Something went wrong</div>
    <div class="err-msg" id="errMsg"></div>
    <div style="margin-top:12px;display:flex;gap:8px;">
      <button class="btn" id="errSignOutBtn" style="display:none;"><i class="ti ti-logout"></i>Sign out &amp; try a different account</button>
      <a class="btn" id="errBackBtn" href="/" style="display:none;text-decoration:none;"><i class="ti ti-arrow-left"></i>Back to quote builder</a>
    </div>
  </div>

  <!-- Sections + photos pane -->
  <div id="mainPane" style="display:none;">
    <div class="card">
      <div class="pane">
        <div class="pane-header">
          <h2><i class="ti ti-folders" style="vertical-align:middle;margin-right:4px;"></i>Sections &amp; photos</h2>
          <div class="pane-actions">
            <button class="btn" id="syncSectionsBtn"><i class="ti ti-refresh"></i>Sync from SM8</button>
          </div>
        </div>
        <div style="font-size:12px;color:var(--rf-muted);line-height:1.5;margin-bottom:6px;">
          Sections come from your ServiceM8 job templates and aren't edited here. Photos can be added, removed, moved between sections, and reordered by drag.
        </div>
        <div id="paneRollup" class="pane-rollup" style="display:none;"></div>
        <div id="sectionsList"></div>
      </div>
    </div>
  </div>

</div>

<input type="file" id="fileInput" multiple accept="image/*" style="display:none">

<script>
const ADMIN_API = "https://rafter-admin-api.will-8e8.workers.dev";
const PHOTO_HOST = "https://rafter-materials-sync.will-8e8.workers.dev";

const state = {
  uuid: null,
  slug: null,
  company_name: null,
  sections: [],     // [{ name, text }]
  photos: [],       // [{ name (category), photos: [{ key, filename }] }]
  uploadTargetCategory: null, // set when user clicks "Add photos" in a section
  selected: new Set(), // RFT-63 Q6: photo keys currently selected for bulk ops
  dragSrcKey: null,    // RFT-63 Q6: drag-reorder src key
};

function $(id) { return document.getElementById(id); }

function toast(msg, type) {
  const t = document.createElement('div');
  t.className = 'toast' + (type === 'err' ? ' err' : '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

function showError(msg, opts) {
  $('loadingState').style.display = 'none';
  $('mainPane').style.display = 'none';
  $('errorState').style.display = '';
  if (opts && opts.title) $('errTitle').textContent = opts.title;
  $('errMsg').textContent = msg;
  $('errSignOutBtn').style.display = (opts && opts.showSignOut) ? '' : 'none';
  // RFT-63 Q5: dead-end paths (admin-only) show a back link rather than
  // a sign-out — let the user return to the form they came from.
  const backBtn = $('errBackBtn');
  if (backBtn) backBtn.style.display = (opts && opts.backToForm) ? '' : 'none';
}

async function signOutAndRetry() {
  try { if (window.Clerk?.signOut) await Clerk.signOut(); } catch (e) { /* swallow */ }
  if (window.Clerk?.redirectToSignIn) {
    Clerk.redirectToSignIn({ redirectUrl: window.location.href });
  } else {
    window.location.replace('/sign-up');
  }
}

async function authedFetch(url, opts = {}) {
  const headers = new Headers(opts.headers || {});
  const jwt = await Clerk.session.getToken();
  if (jwt) headers.set('Authorization', `Bearer ${jwt}`);
  const res = await fetch(url, { ...opts, headers });
  return res;
}

// ─── Boot ────────────────────────────────────────────────────────────────────
async function boot() {
  $('errSignOutBtn').addEventListener('click', signOutAndRetry);

  if (!window.Clerk) {
    showError('Authentication library failed to load. Please refresh.');
    return;
  }
  try {
    await Clerk.load();
  } catch (e) {
    showError('Could not load authentication. Please refresh.');
    return;
  }
  if (!Clerk.user) {
    if (Clerk.redirectToSignIn) {
      Clerk.redirectToSignIn({ redirectUrl: window.location.href });
    } else {
      window.location.replace('/sign-up');
    }
    return;
  }

  await loadState();
}

async function loadState() {
  try {
    const res = await authedFetch(`${ADMIN_API}/settings/state`);
    if (res.status === 401) {
      if (Clerk.redirectToSignIn) Clerk.redirectToSignIn({ redirectUrl: window.location.href });
      return;
    }
    if (res.status === 403) {
      const data = await res.json().catch(() => ({}));
      if (data.code === 'NOT_ADMIN') {
        // RFT-63 Q5: member is the RIGHT account with the WRONG role —
        // sign-out solves nothing (they'd re-sign-in as the same member).
        // Dead-end message + back-to-form link only. No sign-out button.
        showError('Settings are admin-only. Ask your account admin if you need access.', { title: 'Admin access required', backToForm: true });
      } else {
        // Cross-tenant (rare here — JWT org doesn't match tenant uuid).
        // This IS a "wrong account" case, so the sign-out hatch still fits.
        showError("You don't have access. Sign in with the right account.", { title: 'Access denied', showSignOut: true });
      }
      return;
    }
    if (res.status === 404) {
      showError('No client record found for this organisation.', { title: 'Not provisioned' });
      return;
    }
    if (!res.ok) {
      showError(`Couldn't load settings (HTTP ${res.status}). Please refresh.`);
      return;
    }
    const data = await res.json();
    state.uuid = data.uuid;
    state.slug = data.slug;
    state.company_name = data.company_name;
    state.sections = data.sections || [];
    state.photos = data.photos || [];
    render();
  } catch (e) {
    showError('Network error loading settings. Please refresh.');
  }
}

// ─── Render ──────────────────────────────────────────────────────────────────
function render() {
  $('loadingState').style.display = 'none';
  $('mainPane').style.display = '';
  $('topbarTitle').textContent = `Settings · ${state.company_name || state.slug || ''}`;
  $('backLink').href = state.slug ? `/${encodeURIComponent(state.slug)}` : '/';

  const photoMap = new Map(state.photos.map(c => [c.name, c.photos]));
  const sectionsList = $('sectionsList');
  sectionsList.innerHTML = '';

  if (!state.sections.length) {
    sectionsList.innerHTML = `<div class="no-photos">No sections yet — click "Sync from SM8" to import job templates.</div>`;
    $('paneRollup').style.display = 'none';
    return;
  }

  // RFT-63 Q6: count rollup at the top — total photos + per-section breakdown.
  let totalPhotos = 0;
  const perSection = [];
  for (const sec of state.sections) {
    const catSlug = slugify(sec.name);
    const count = (photoMap.get(catSlug) || []).length;
    perSection.push({ name: sec.name, count });
    totalPhotos += count;
  }
  const rollupEl = $('paneRollup');
  if (totalPhotos === 0) {
    rollupEl.innerHTML = `<strong>0 photos</strong> across ${state.sections.length} section${state.sections.length === 1 ? '' : 's'}.`;
  } else {
    const sectionsWithPhotos = perSection.filter(s => s.count > 0).length;
    rollupEl.innerHTML = `<strong>${totalPhotos}</strong> photo${totalPhotos === 1 ? '' : 's'} across ${sectionsWithPhotos} of ${state.sections.length} section${state.sections.length === 1 ? '' : 's'}.`;
  }
  rollupEl.style.display = '';

  // Render each section card
  for (const sec of state.sections) {
    const catSlug = slugify(sec.name);
    const photos = photoMap.get(catSlug) || [];
    const card = document.createElement('div');
    card.className = 'section-card';
    card.dataset.categorySlug = catSlug;
    card.innerHTML = `
      <div class="sec-head">
        <span class="sec-name">${esc(sec.name)}</span>
        <span class="sec-readonly-badge" title="Section prose is read-only here — edit in ServiceM8 and sync">SM8</span>
      </div>
      <div class="sec-prose ${sec.text ? '' : 'sec-prose-empty'}">${esc(sec.text || '(no prose set)')}</div>
      <div class="sec-photos">
        <div class="sec-photos-meta">
          <span>${photos.length} photo${photos.length === 1 ? '' : 's'}</span>
        </div>
        ${photos.length === 0
          ? '<div class="no-photos">No photos yet for this section.</div>'
          : '<div class="photo-grid">' + photos.map(p => renderPhotoCell(p, catSlug)).join('') + '</div>'}
        <div class="sec-bulk-bar" data-bulk-bar="${esc(catSlug)}"></div>
        <div class="upload-row">
          <button class="btn" data-action="add-photos" data-category="${esc(catSlug)}"><i class="ti ti-upload"></i>Add photos</button>
        </div>
      </div>
    `;
    sectionsList.appendChild(card);
  }

  // Wire up cell-level events
  wireCellEvents(sectionsList);

  // Wire up Add-photos buttons
  sectionsList.querySelectorAll('[data-action="add-photos"]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.uploadTargetCategory = btn.dataset.category;
      $('fileInput').click();
    });
  });

  updateBulkBars();
}

function renderPhotoCell(p, currentCat) {
  const url = `${PHOTO_HOST}/photo?uuid=${state.uuid}&key=${encodeURIComponent(p.key)}`;
  const selected = state.selected.has(p.key) ? ' selected' : '';
  return `
    <div class="photo-cell${selected}" draggable="true" data-key="${esc(p.key)}" data-category="${esc(currentCat)}">
      <img loading="lazy" src="${esc(url)}" alt="${esc(p.filename)}">
      <div class="photo-check" data-action="toggle-select" data-key="${esc(p.key)}" title="Select"><i class="ti ti-check check-mark"></i></div>
      <div class="photo-actions">
        <button class="photo-action-btn" data-action="recat-photo" data-key="${esc(p.key)}" data-current-cat="${esc(currentCat)}" title="Move to another section"><i class="ti ti-folder-symlink"></i></button>
        <button class="photo-action-btn" data-action="delete-photo" data-key="${esc(p.key)}" title="Delete"><i class="ti ti-trash"></i></button>
      </div>
    </div>
  `;
}

function wireCellEvents(root) {
  // Single delete + recategorise
  root.querySelectorAll('[data-action="delete-photo"]').forEach(btn => {
    btn.addEventListener('click', (e) => { e.stopPropagation(); deletePhoto(btn.dataset.key); });
  });
  root.querySelectorAll('[data-action="recat-photo"]').forEach(btn => {
    btn.addEventListener('click', (e) => { e.stopPropagation(); openRecategoriseModal([btn.dataset.key], btn.dataset.currentCat); });
  });
  // RFT-63 Q6: select toggle
  root.querySelectorAll('[data-action="toggle-select"]').forEach(box => {
    box.addEventListener('click', (e) => {
      e.stopPropagation();
      const key = box.dataset.key;
      if (state.selected.has(key)) state.selected.delete(key);
      else state.selected.add(key);
      const cell = box.closest('.photo-cell');
      if (cell) cell.classList.toggle('selected', state.selected.has(key));
      updateBulkBars();
    });
  });
  // RFT-63 Q6: drag-reorder within a section
  root.querySelectorAll('.photo-cell').forEach(cell => {
    cell.addEventListener('dragstart', (e) => {
      state.dragSrcKey = cell.dataset.key;
      cell.classList.add('drag-ghost');
      try { e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', cell.dataset.key); } catch {}
    });
    cell.addEventListener('dragend', () => { cell.classList.remove('drag-ghost'); cleanDragOverState(); });
    cell.addEventListener('dragover', (e) => {
      const srcKey = state.dragSrcKey;
      if (!srcKey || srcKey === cell.dataset.key) return;
      // Only allow drop within the same category
      const srcCell = root.querySelector(`.photo-cell[data-key="${cssEscape(srcKey)}"]`);
      if (!srcCell || srcCell.dataset.category !== cell.dataset.category) return;
      e.preventDefault();
      cell.classList.add('drag-over');
    });
    cell.addEventListener('dragleave', () => { cell.classList.remove('drag-over'); });
    cell.addEventListener('drop', async (e) => {
      e.preventDefault();
      cell.classList.remove('drag-over');
      const srcKey = state.dragSrcKey;
      state.dragSrcKey = null;
      if (!srcKey || srcKey === cell.dataset.key) return;
      const cat = cell.dataset.category;
      await reorderPhoto(cat, srcKey, cell.dataset.key);
    });
  });
}

function cleanDragOverState() {
  document.querySelectorAll('.photo-cell.drag-over').forEach(el => el.classList.remove('drag-over'));
}

// CSS.escape() is available in modern browsers — fall back to a minimal escape
// for cases where it's not. Used for attribute-selector key lookups.
function cssEscape(s) { return (typeof CSS !== 'undefined' && CSS.escape) ? CSS.escape(s) : String(s).replace(/[^a-zA-Z0-9-_]/g, '\\$&'); }

// Update each section's bulk-action bar based on what's currently selected.
function updateBulkBars() {
  document.querySelectorAll('.sec-bulk-bar').forEach(bar => {
    const cat = bar.dataset.bulkBar;
    const cardPhotos = (state.photos.find(c => c.name === cat) || { photos: [] }).photos;
    const selectedInSection = cardPhotos.filter(p => state.selected.has(p.key)).map(p => p.key);
    if (selectedInSection.length === 0) {
      bar.classList.remove('visible');
      bar.innerHTML = '';
      return;
    }
    bar.classList.add('visible');
    bar.innerHTML = `
      <span class="sec-bulk-count">${selectedInSection.length} selected</span>
      <button class="btn small" data-bulk-action="move" data-cat="${esc(cat)}"><i class="ti ti-folder-symlink"></i>Move to…</button>
      <button class="btn small danger" data-bulk-action="delete" data-cat="${esc(cat)}"><i class="ti ti-trash"></i>Delete selected</button>
      <button class="btn small" data-bulk-action="clear" data-cat="${esc(cat)}">Clear</button>
    `;
    bar.querySelector('[data-bulk-action="delete"]').addEventListener('click', () => bulkDelete(selectedInSection));
    bar.querySelector('[data-bulk-action="move"]').addEventListener('click', () => openRecategoriseModal(selectedInSection, cat));
    bar.querySelector('[data-bulk-action="clear"]').addEventListener('click', () => {
      for (const k of selectedInSection) state.selected.delete(k);
      // Re-render only the affected cells' selected class; cheap loop
      document.querySelectorAll(`.photo-cell[data-category="${cssEscape(cat)}"]`).forEach(c => c.classList.remove('selected'));
      updateBulkBars();
    });
  });
}

// ─── Photo actions ───────────────────────────────────────────────────────────
async function deletePhoto(key) {
  if (!confirm('Delete this photo? This cannot be undone.')) return;
  try {
    const res = await authedFetch(`${ADMIN_API}/settings/photos/delete`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key }),
    });
    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      throw new Error(data.error || `delete_${res.status}`);
    }
    state.selected.delete(key);
    toast('Photo deleted', 'ok');
    await loadState();
  } catch (e) {
    toast(`Couldn't delete: ${e.message || e}`, 'err');
  }
}

// RFT-63 Q6: bulk delete — single confirm, single API call.
async function bulkDelete(keys) {
  if (!keys.length) return;
  if (!confirm(`Delete ${keys.length} photo${keys.length === 1 ? '' : 's'}? This cannot be undone.`)) return;
  try {
    const res = await authedFetch(`${ADMIN_API}/settings/photos/bulk-delete`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ keys }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || `bulk_delete_${res.status}`);
    for (const k of keys) state.selected.delete(k);
    const failedNote = data.failed ? ` (${data.failed} failed)` : '';
    toast(`Deleted ${data.deleted}${failedNote}`, data.failed ? 'err' : 'ok');
    await loadState();
  } catch (e) {
    toast(`Bulk delete failed: ${e.message || e}`, 'err');
  }
}

// RFT-63 Q6: drag-reorder within a section. Optimistic compute → call API
// with the new key order → server stores it → reload to confirm.
async function reorderPhoto(category, srcKey, destKey) {
  const cat = state.photos.find(c => c.name === category);
  if (!cat) return;
  const keys = cat.photos.map(p => p.key);
  const srcIdx = keys.indexOf(srcKey);
  const destIdx = keys.indexOf(destKey);
  if (srcIdx < 0 || destIdx < 0 || srcIdx === destIdx) return;
  // Pull src out, splice in at destIdx (move-before semantics)
  const newOrder = keys.slice();
  newOrder.splice(srcIdx, 1);
  const insertAt = newOrder.indexOf(destKey); // recompute after removal
  newOrder.splice(insertAt, 0, srcKey);
  try {
    const res = await authedFetch(`${ADMIN_API}/settings/photos/reorder`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ category, key_order: newOrder }),
    });
    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      throw new Error(data.error || `reorder_${res.status}`);
    }
    await loadState();
  } catch (e) {
    toast(`Couldn't reorder: ${e.message || e}`, 'err');
  }
}

// RFT-63 Q6: recategorise modal — handles BOTH single (called with [key]) and
// bulk (called with [k1, k2, …]). The API call routes to /recategorise or
// /bulk-recategorise based on count.
function openRecategoriseModal(keys, currentCat) {
  if (!keys || !keys.length) return;
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  const sectionNames = state.sections.map(s => ({ name: s.name, slug: slugify(s.name) }));
  const title = keys.length === 1 ? 'Move photo to&hellip;' : `Move ${keys.length} photos to&hellip;`;
  backdrop.innerHTML = `
    <div class="modal">
      <h3>${title}</h3>
      <div class="modal-pills" id="modal-pills">
        ${sectionNames.map(s => `
          <button class="modal-pill ${s.slug === currentCat ? 'current' : ''}" data-cat="${esc(s.name)}" ${s.slug === currentCat ? 'disabled' : ''}>${esc(s.name)}</button>
        `).join('')}
      </div>
      <div class="modal-actions">
        <button class="btn" id="modal-cancel">Cancel</button>
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);
  const close = () => backdrop.remove();
  backdrop.addEventListener('click', (e) => { if (e.target === backdrop) close(); });
  backdrop.querySelector('#modal-cancel').addEventListener('click', close);
  backdrop.querySelectorAll('.modal-pill:not(.current)').forEach(btn => {
    btn.addEventListener('click', async () => {
      const toCategory = btn.dataset.cat;
      close();
      try {
        let res;
        if (keys.length === 1) {
          res = await authedFetch(`${ADMIN_API}/settings/photos/recategorise`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ key: keys[0], to_category: toCategory }),
          });
        } else {
          res = await authedFetch(`${ADMIN_API}/settings/photos/bulk-recategorise`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ keys, to_category: toCategory }),
          });
        }
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || `recat_${res.status}`);
        for (const k of keys) state.selected.delete(k);
        const okCount = data.moved ?? 1;
        const failedNote = data.failed ? ` (${data.failed} failed)` : '';
        toast(`Moved ${okCount} to "${toCategory}"${failedNote}`, data.failed ? 'err' : 'ok');
        await loadState();
      } catch (e) {
        toast(`Couldn't move: ${e.message || e}`, 'err');
      }
    });
  });
}

async function uploadFiles(files) {
  const category = state.uploadTargetCategory;
  if (!category) { toast('No section selected for upload', 'err'); return; }
  let okCount = 0, failCount = 0;
  for (const file of files) {
    try {
      const fd = new FormData();
      fd.append('file', file);
      fd.append('category', category);
      const res = await authedFetch(`${ADMIN_API}/settings/photos/upload`, {
        method: 'POST',
        body: fd,
      });
      if (!res.ok) throw new Error(`upload_${res.status}`);
      okCount++;
    } catch (e) {
      failCount++;
      console.warn('upload failed:', e);
    }
  }
  toast(`Uploaded ${okCount}${failCount ? ` (${failCount} failed)` : ''}`, failCount ? 'err' : 'ok');
  state.uploadTargetCategory = null;
  await loadState();
}

$('fileInput').addEventListener('change', () => {
  const files = Array.from($('fileInput').files || []);
  $('fileInput').value = '';
  if (files.length) uploadFiles(files);
});

// ─── Sections sync ───────────────────────────────────────────────────────────
$('syncSectionsBtn').addEventListener('click', async () => {
  const btn = $('syncSectionsBtn');
  const original = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader-2"></i>Syncing&hellip;';
  try {
    const res = await authedFetch(`${ADMIN_API}/settings/sections/sync`, { method: 'POST' });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || `sync_${res.status}`);
    const addedNote = data.added && data.added.length ? ` (${data.added.length} new: ${data.added.join(', ')})` : ' (no new sections)';
    toast(`Synced ${data.total} sections${addedNote}`, 'ok');
    await loadState();
  } catch (e) {
    toast(`Sync failed: ${e.message || e}`, 'err');
  } finally {
    btn.disabled = false;
    btn.innerHTML = original;
  }
});

// ─── Helpers ─────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
// Same slugify rule as admin-api sanitisePathSegment + RFT-78 #4 v2 — so the
// section name → category slug round-trips with the photo storage.
function slugify(s) {
  return String(s || '').trim().toLowerCase()
    .replace(/[^a-z0-9-]/g, '-')
    .replace(/-+/g, '-')
    .replace(/^-|-$/g, '');
}

boot();
</script>
