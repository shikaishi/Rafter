<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rafter Setup — Complete</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #0F1117; --ink-soft: #52585F; --ink-faint: #9AA0A6;
    --canvas: #F7F5F0; --white: #FFFFFF;
    --green: #1D9E75; --green-light: #E1F5EE;
    --border: #E2DDD6; --red: #E53935; --red-light: #FEF2F2;
  }
  html, body { min-height: 100vh; background: var(--canvas); font-family: 'DM Sans', sans-serif; color: var(--ink); -webkit-font-smoothing: antialiased; }
  .page { min-height: 100vh; display: flex; flex-direction: column; }
  header { padding: 24px 40px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); background: rgba(247,245,240,0.8); }
  .logo-mark { width: 32px; height: 32px; background: #0D2E1C; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .logo-name { font-family: 'Instrument Serif', serif; font-size: 18px; color: var(--ink); letter-spacing: -0.02em; }
  .logo-sep { color: var(--border); margin: 0 4px; }
  .logo-sub { font-size: 13px; color: var(--ink-soft); font-family: 'DM Mono', monospace; }
  main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 60px 24px; }
  .card { background: var(--white); border: 1px solid var(--border); border-radius: 20px; padding: 56px 52px; max-width: 480px; width: 100%; text-align: center; box-shadow: 0 4px 32px rgba(15,17,23,0.06); animation: rise 0.5s cubic-bezier(0.22,1,0.36,1) both; }
  @keyframes rise { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  .spinner { width: 44px; height: 44px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 24px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .check { width: 64px; height: 64px; background: var(--green-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; }
  h1 { font-family: 'Instrument Serif', serif; font-size: 30px; font-weight: 400; letter-spacing: -0.02em; margin-bottom: 12px; }
  p { font-size: 15px; color: var(--ink-soft); line-height: 1.7; }
  .status { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--ink-faint); margin-top: 16px; }
  .error-box { background: var(--red-light); border: 1px solid #FCA5A5; border-radius: 12px; padding: 20px; margin-top: 20px; text-align: left; }
  .error-title { font-weight: 500; color: var(--red); margin-bottom: 8px; }
  .error-msg { font-size: 12px; color: #B91C1C; font-family: 'DM Mono', monospace; word-break: break-all; }
  footer { padding: 20px 40px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; }
  .footer-brand { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--ink-faint); letter-spacing: 0.06em; }
</style>
</head>
<body>
<div class="page">
  <header>
    <img src="https://rafter-materials-sync.will-8e8.workers.dev/brand/rafter-logo.png" alt="Rafter" style="height:32px;width:auto;">
    <span class="logo-name">Rafter</span>
    <span class="logo-sep">·</span>
    <span class="logo-sub">Account Setup</span>
  </header>

  <main>
    <div class="card" id="card">
      <div class="spinner" id="spinner"></div>
      <h1 id="title">Connecting your account…</h1>
      <p id="message">Please wait while we read your ServiceM8 configuration.</p>
      <div class="status" id="status">Exchanging authorisation code</div>
    </div>
  </main>

  <footer>
    <span class="footer-brand">DEEP GREEN SEA · RAFTER</span>
    <span style="font-size:11px;color:var(--ink-faint)">Read-only · No data stored</span>
  </footer>
</div>

<!-- RFT-87 scope (b): pinned to 6.14.0. Was @latest — moving target on an
     auth surface that owns first-device passkey enrol. -->
<script
  data-clerk-publishable-key="pk_live_Y2xlcmsuZGVlcGdyZWVuc2VhLmF1JA"
  src="https://clerk.deepgreensea.au/npm/@clerk/clerk-js@6.14.0/dist/clerk.browser.js"
  crossorigin="anonymous"
></script>
<script>
  const ADMIN_API = 'https://rafter-admin-api.will-8e8.workers.dev';

  function setStatus(msg) { document.getElementById('status').textContent = msg; }

  function showComplete(passkeyResult) {
    document.getElementById('spinner').style.display = 'none';
    const check = document.createElement('div');
    check.className = 'check';
    check.innerHTML = '<svg viewBox="0 0 32 32" fill="none" width="32" height="32"><path d="M6 16L13 23L26 10" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    document.getElementById('card').insertBefore(check, document.getElementById('title'));
    document.getElementById('title').textContent = 'Setup complete';
    // RFT-87 scope (a): show passkey state — enrolled means silent auth from
    // now on this device; cancelled/skipped means user will see Clerk's
    // sign-in UI again on next visit. Setup itself succeeded either way.
    let msg = 'Your ServiceM8 account has been connected successfully. You can close this window.';
    if (passkeyResult === 'enrolled') {
      msg = 'ServiceM8 connected and this device enrolled — next time you open the form, you\'ll sign in with one tap.';
    } else if (passkeyResult === 'cancelled') {
      msg = 'ServiceM8 connected. Device passkey was skipped — you\'ll need to sign in again next time. You can close this window.';
    }
    document.getElementById('message').textContent = msg;
    document.getElementById('status').textContent = '';
  }

  function showError(msg) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('title').textContent = 'Something went wrong';
    document.getElementById('message').style.display = 'none';
    document.getElementById('status').style.display = 'none';
    const box = document.createElement('div');
    box.className = 'error-box';
    const title = document.createElement('div');
    title.className = 'error-title';
    title.textContent = 'Error';
    const body = document.createElement('div');
    body.className = 'error-msg';
    body.textContent = msg;
    box.appendChild(title);
    box.appendChild(body);
    document.getElementById('card').appendChild(box);
  }

  async function getClerkToken() {
    if (!window.Clerk) throw new Error('Authentication library failed to load. Please refresh.');
    try {
      await Promise.race([
        Clerk.load(),
        new Promise((_, reject) => setTimeout(() => reject(new Error('Clerk load timed out')), 10000)),
      ]);
    } catch (err) {
      throw new Error('Authentication error: ' + err.message);
    }
    if (!Clerk.user) throw new Error('No active session. Please return to onboarding and sign in again.');
    const token = await Clerk.session.getToken();
    if (!token) throw new Error('Could not retrieve authentication token.');
    return token;
  }

  async function run() {
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const returnedState = params.get('state');
    const error = params.get('error');

    if (error) {
      showError('ServiceM8 returned an error: ' + (params.get('error_description') || error));
      return;
    }

    if (!code) {
      showError('No authorisation code received from ServiceM8. Please go back and try again.');
      return;
    }

    const savedState = sessionStorage.getItem('oauth_state');
    if (!savedState || returnedState !== savedState) {
      showError('Security check failed (state mismatch). Please go back to the setup page and try again.');
      return;
    }
    sessionStorage.removeItem('oauth_state');

    try {
      setStatus('Authenticating…');
      const jwt = await getClerkToken();

      setStatus('Exchanging authorisation code…');
      const res = await fetch(`${ADMIN_API}/onboarding/sm8-callback`, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${jwt}`,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ code }),
      });

      if (!res.ok) {
        let body = {};
        try { body = await res.json(); } catch {}
        const detail = body.detail || body.error || `HTTP ${res.status}`;
        throw new Error('Token exchange failed: ' + detail);
      }

      // RFT-87 scope (a) — setup-device passkey enrolment — ride the Clerk
      // session already established for SM8 OAuth. Origin = this page
      // (rafter.deepgreensea.au) so the resulting passkey's RP ID is
      // rafter.deepgreensea.au — the correct origin for the operator form.
      //
      // RFT-87 scope (b) hardening (2026-06-11):
      //   * Active-status gate added — refuse to call createPasskey unless
      //     Clerk.session?.status === 'active'. isSignedIn is not sufficient;
      //     pending sessions report signed-in but tasks uncleared, and
      //     createPasskey against a pending session is undocumented per
      //     Clerk docs.
      //   * currentTask sanity log — the admin who lands here just signed up
      //     and created their org seconds ago, so choose-organization should
      //     never fire here. If it does, surface it for deploy-time debugging
      //     rather than silently calling createPasskey.
      //
      // Non-blocking: if enrolment fails (user cancels biometric, browser
      // lacks WebAuthn, already has a passkey, session not active, anything
      // else), setup still succeeds. The endpoint JWT gate is the hard auth
      // boundary; the passkey is just silent re-auth on this device.
      let passkeyResult = 'skipped';
      try {
        const sessionStatus = Clerk.session?.status;
        const currentTask = Clerk.session?.currentTask?.key ?? null;
        if (currentTask) {
          // Unexpected here — admin's session should be fully active after
          // OAuth. Log + skip enrol; the SM8 connection still succeeded.
          console.warn('[callback] unexpected currentTask after OAuth — skipping passkey enrol', { currentTask, sessionStatus });
          passkeyResult = 'session_pending';
        } else if (sessionStatus !== 'active') {
          console.warn('[callback] session not active — skipping passkey enrol', { sessionStatus });
          passkeyResult = 'session_not_active';
        } else {
          const existing = Clerk.user.passkeys || [];
          if (existing.length === 0) {
            setStatus('Setting up passkey for this device…');
            await Clerk.user.createPasskey();
            passkeyResult = 'enrolled';
          } else {
            passkeyResult = 'already_enrolled';
          }
        }
      } catch (err) {
        // Most commonly: user cancelled biometric, or browser blocked the
        // WebAuthn prompt. Setup still complete — just note it.
        console.warn('Passkey enrolment skipped:', err?.message || err);
        passkeyResult = 'cancelled';
      }

      const returnTo = sessionStorage.getItem('oauth_return_to');
      sessionStorage.removeItem('oauth_return_to');
      if (returnTo === 'onboarding') {
        window.location.replace('/onboarding.html?oauth_complete=1');
        return;
      }
      // RFT-118: Settings → ServiceM8 Connection reconnect path. Lands the
      // admin back on /settings rather than dumping them at the wizard.
      if (returnTo === 'settings') {
        window.location.replace('/settings?sm8_reconnect=ok');
        return;
      }
      showComplete(passkeyResult);

    } catch(err) {
      showError(err.message || 'An unexpected error occurred.');
    }
  }

  run();
</script>
</body>
</html>
