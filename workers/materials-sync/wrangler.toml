name = "rafter-materials-sync"
main = "index.js"
compatibility_date = "2024-01-01"

[[kv_namespaces]]
binding = "RAFTER_CLIENTS"
id = "7c7ad02d8136452eb6d03d1af89a684f"

[[r2_buckets]]
binding = "RAFTER_ASSETS"
bucket_name = "rafter-assets"

[[d1_databases]]
binding = "RAFTER_EVENTS"
database_name = "rafter-events"
database_id = "39f38376-d163-439b-984d-2f0889e88d56"

[[d1_databases]]
binding = "RAFTER_QUOTES"
database_name = "rafter-quotes"
database_id = "71594968-73c4-490a-b4bc-a425b0400402"

# Service binding to PDF worker for amend op (RFT-39). Constraint #11: W2W
# subrequests via workers.dev URLs are silently dropped — service binding only.
[[services]]
binding = "PDF_WORKER"
service = "rafter-pdf"

# RFT-87 scope (a): service binding to admin-api for Clerk-JWT verification on
# form-callable endpoints. Form sends JWT in Authorization; handlers proxy that
# header to admin-api's /form/verify-tenant which does the verifyToken + the
# cross-tenant uuid match. Single source of truth in admin-api (where the
# @clerk/backend dependency already lives).
[[services]]
binding = "ADMIN_API"
service = "rafter-admin-api"

[triggers]
crons = ["0 10 * * *"]

# RFT-95: per-IP rate limits with x-rafter-secret bypass for trusted internal
# callers. Two namespaces — 1002 token-mint (60/60s — form mints several per
# session: refresh-materials, submit, amend, drafts, preview), 1003 amend
# (10/60s — deliberate human action). namespace 1001 (submit) lives on the
# pdf worker.
[[ratelimits]]
name = "RATE_TOKEN_MINT"
namespace_id = "1002"
simple = { limit = 60, period = 60 }

[[ratelimits]]
name = "RATE_AMEND"
namespace_id = "1003"
simple = { limit = 10, period = 60 }
