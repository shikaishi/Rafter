name = "rafter-pdf"
main = "index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "RAFTER_CLIENTS"
id = "7c7ad02d8136452eb6d03d1af89a684f"

[[r2_buckets]]
binding = "RAFTER_ASSETS"
bucket_name = "rafter-assets"

[browser]
binding = "BROWSER"

# RFT-95: per-IP submit rate limit. 10/60s per cf-connecting-ip on
# /generate?mode=submit — survives double-tap + page-refresh retries, blocks
# scripted abuse. preview mode (admin smoketest, internal preview) is NOT
# limited. namespace 1001 reserved for submit across the platform.
[[ratelimits]]
name = "RATE_SUBMIT"
namespace_id = "1001"
simple = { limit = 10, period = 60 }
